<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>content-gallery h5 template</title>
    <style>
      * {
        margin: 0;
      }

      #ad-wrapper {
        width: 100%;
        height: 150vw;
        position: relative;
        overflow: hidden;
      }

      #background {
        width: 100%;
        height: 100%;
        position: absolute;
        z-index: -1;
      }

      .element {
        position: absolute;
        color: white;
        font-weight: bold;
      }

      #element1 {
        top: 56.6%;
        left: 26.5%;
        font-size: 1.2rem;
        transform: rotate(3deg);
      }

      #element2 {
        top: 66.1%;
        right: 10.5%;
        font-size: 1.1rem;
        transform: rotate(-5deg);
      }

      #element3 {
        top: 44.2%;
        right: 22.5%;
        font-size: 1.5rem;
      }

      .vanish {
        animation: dropOut 0.06s ease forwards;
      }

      @keyframes dropOut {
        0% {
          transform: translateY(0);
          opacity: 1;
        }

        100% {
          transform: translateY(36px) scaleX(0.2);
          opacity: 0;
        }
      }

      @font-face {
        font-family: "MyFont";
        src: url("./images/537/MYingHeiHK-W8.ttf") format("truetype");
      }

      body {
        font-family: "MyFont", sans-serif;
      }
    </style>
  </head>
  <body>
    <img src="./images/background0.png" style="width: 100vw" />
    <img src="./images/background1.png" style="width: 100vw" />
    <div id="ad-wrapper" onclick="openUrl('https://www.google.com/')">
      <video autoplay muted playsinline style="width: 100%" id="background">
        <source src="./images/537/background.mp4" type="video/mp4" />
        Your browser does not support the video tag.
      </video>
      <div id="element1" class="element"></div>
      <div id="element2" class="element"></div>
      <div id="element3" class="element"></div>
    </div>
    <img src="./images/background2.png" style="width: 100vw" />
  </body>
  <script>
    const video = document.getElementById("background");
    let lastTime = -1;
    let element1Shown = false;
    let element2Shown = false;
    let element3Shown = false;
    const numbers = Array.from({ length: 2 }, () =>
      parseFloat((Math.random() * 10 + 90).toFixed(1))
    );

    window.addEventListener("scroll", (event) => {
      const videoHeight = video.getBoundingClientRect().height;
      const topValue = video.getBoundingClientRect().y;
      const screenH = window.screen.height;

      if (
        topValue < screenH - videoHeight / 2 &&
        topValue > -(videoHeight / 2)
      ) {
        video.play();
      } else {
        video.pause();
      }
    });

    function animateCounter(elementId, target, duration = 1000) {
      const el = document.getElementById(elementId);
      let startTime = null;

      function update(currentTime) {
        if (!startTime) startTime = currentTime;

        const progress = Math.min((currentTime - startTime) / duration, 1);
        const value = (progress * target).toFixed(1);

        el.textContent = value;

        if (progress < 1) {
          requestAnimationFrame(update);
        }
      }

      requestAnimationFrame(update);
    }

    function vanish(element) {
      element.classList.add("vanish");
      setTimeout(() => {
        element.remove();
      }, 200);
    }

    function trackTime() {
      const { currentTime } = video;
      if (currentTime !== lastTime) {
        lastTime = currentTime;
        if (!element1Shown && currentTime > 0.35) {
          animateCounter("element1", numbers[0]);
          setTimeout(() => {
            const element1 = document.getElementById("element1");
            vanish(element1);
          }, 2000);
          element1Shown = true;
        }
        if (!element2Shown && currentTime > 0.38) {
          animateCounter("element2", numbers[1]);
          setTimeout(() => {
            const element2 = document.getElementById("element2");
            vanish(element2);
          }, 1970);
          element2Shown = true;
        }
        if (!element3Shown && currentTime > 2.4) {
          animateCounter(
            "element3",
            ((numbers[0] + numbers[1]) / 2).toFixed(1)
          );
          setTimeout(() => {
            const element3 = document.getElementById("element3");
            vanish(element3);
          }, 2300);
          element3Shown = true;
        }
      }
      requestAnimationFrame(trackTime);
    }

    requestAnimationFrame(trackTime);

    function openUrl(url) {
      window.open(url);
    }
  </script>
</html>
