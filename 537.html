<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>content-gallery h5 template</title>
    <style>
      * {
        margin: 0;
      }

      #ad-wrapper {
        width: 100%;
        height: 150vw;
        position: relative;
        overflow: hidden;
      }

      #background {
        width: 100%;
        height: 100%;
        position: absolute;
        z-index: -1;
      }

      .element {
        position: absolute;
      }

      .element p {
        color: white;
        position: absolute;
        right: 20%;
        top: 50%;
        transform: translate(0, -50%);
        font-size: 2rem;
        font-weight: bold;
      }

      .element img {
        width: 100%;
        display: none;
      }

      #element1 {
        width: 39vw;
        top: 54%;
        left: 7%;
        transform: perspective(58px) rotateX(0deg) rotateY(-4deg) skewX(-11deg);
      }

      #element2 {
        width: 39vw;
        top: 66%;
        right: 3%;
        transform: perspective(89px) rotateX(0deg) rotateY(5deg) skewX(12deg);
      }

      #element3 {
        width: 41vw;
        top: 42.5%;
        left: 42%;
      }

      .vanish {
        animation: dropOut 0.06s ease forwards;
      }

      @keyframes dropOut {
        0% {
          transform: translateY(0);
          opacity: 1;
        }

        100% {
          transform: translateY(36px) scaleX(0.2);
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <img src="./images/background0.png" style="width: 100vw" />
    <img src="./images/background1.png" style="width: 100vw" />
    <div id="ad-wrapper" onclick="openUrl('https://www.google.com/')">
      <video autoplay muted playsinline style="width: 100%" id="background">
        <source src="./images/537/background.mp4" type="video/mp4" />
        Your browser does not support the video tag.
      </video>
      <div id="element1" class="element">
        <img src="" alt="" id="gif1" />
        <p id="counter1"></p>
      </div>
      <div id="element2" class="element">
        <img src="" alt="" id="gif2" />
        <p id="counter2"></p>
      </div>
      <div id="element3" class="element">
        <img src="" alt="" id="gif3" />
        <p id="counter3"></p>
      </div>
    </div>
    <img src="./images/background2.png" style="width: 100vw" />
  </body>
  <script>
    const numbers = Array.from(
      { length: 3 },
      () => Math.floor(Math.random() * 10) + 90
    );

    function animateCounter(elementId, target, duration = 1000) {
      const el = document.getElementById(elementId);
      let startTime = null;

      function update(currentTime) {
        if (!startTime) startTime = currentTime;

        const progress = Math.min((currentTime - startTime) / duration, 1);
        const value = Math.floor(progress * target);

        el.textContent = value;

        if (progress < 1) {
          requestAnimationFrame(update);
        }
      }

      requestAnimationFrame(update);
    }

    function vanish(element) {
      element.classList.add("vanish");
      setTimeout(() => {
        element.remove();
      }, 200);
    }

    const img1 = document.getElementById("gif1");
    img1.src = "./images/537/1.gif";
    img1.style.display = "block";
    setTimeout(() => {
      animateCounter("counter1", numbers[0]);
      setTimeout(() => {
        const element1 = document.getElementById("element1");
        vanish(element1);
      }, 1700);
    }, 500);

    setTimeout(() => {
      const img2 = document.getElementById("gif2");
      img2.src = "./images/537/2.gif";
      img2.style.display = "block";
      setTimeout(() => {
        animateCounter("counter2", numbers[1]);
        setTimeout(() => {
          const element2 = document.getElementById("element2");
          vanish(element2);
        }, 1500);
      }, 500);
    }, 200);

    setTimeout(() => {
      const img3 = document.getElementById("gif3");
      img3.src = "./images/537/3.gif";
      img3.style.display = "block";
      setTimeout(() => {
        animateCounter("counter3", numbers[2]);
        setTimeout(() => {
          const element3 = document.getElementById("element3");
          vanish(element3);
        }, 2100);
      }, 700);
    }, 2000);

    function openUrl(url) {
      window.open(url);
    }
  </script>
</html>
