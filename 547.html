<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>content-gallery h5 template</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/swiper/swiper-bundle.min.css"
    />
    <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/2.1.3/TweenMax.min.js"></script>
    <style>
      * {
        margin: 0;
      }

      body {
        background-color: transparent;
      }

      .banner {
        width: 100vw;
        height: 150vw;
        overflow: hidden;
        position: relative;
      }

      .swiper-container {
        width: 100%;
        height: 150vw;
        opacity: 0;
      }

      .swiper-slide {
        overflow: visible !important;
      }

      .swiper-slide-shadow {
        opacity: 1 !important;
        background: transparent !important;
        box-shadow: 15px 0px 5px 0px rgba(0, 0, 0, 0.4) !important;
      }

      .swiper-slide-img {
        width: 100%;
        height: 150vw;
        padding: 5px;
        box-sizing: border-box;
      }

      @keyframes move {
        0% {
          left: 55%;
        }
        50% {
          left: 45%;
        }
        100% {
          left: 55%;
        }
      }

      #finger {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 1;
        transition: 0.5s;
        width: 64px;
        height: 64px;
        animation: move 1s linear;
        animation-iteration-count: infinite;
      }

      #video {
        position: absolute;
        z-index: 99;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        transition: 0.5s;
      }
    </style>
  </head>
  <body>
    <img src="./images/background0.png" style="width: 100vw" />
    <img src="./images/background1.png" style="width: 100vw" />
    <div class="banner" id="banner">
      <video muted playsinline id="video">
        <source src="./images/547/video.mp4" type="video/mp4" />
        Your browser does not support the video tag.
      </video>
      <!-- Swiper -->
      <div class="swiper-container" id="swiper-container">
        <div class="swiper-wrapper">
          <div class="swiper-slide">
            <img
              class="swiper-slide-img"
              src="./images/547/1.jpg"
              alt=""
              onclick="openUrl()"
            />
          </div>
          <div class="swiper-slide">
            <img
              class="swiper-slide-img"
              src="./images/547/2.jpg"
              alt=""
              onclick="openUrl()"
            />
          </div>
          <div class="swiper-slide">
            <img
              class="swiper-slide-img"
              src="./images/547/3.jpg"
              alt=""
              onclick="openUrl()"
            />
          </div>
        </div>
        <img src="./images/finger.png" alt="" id="finger" />
      </div>
    </div>
    <img src="./images/background2.png" style="width: 100vw" />
  </body>
  <script>
    const finger = document.getElementById("finger");
    const video = document.getElementById("video");
    const swiperContainer = document.getElementById("swiper-container");
    var swiper = new Swiper(".swiper-container", {
      effect: "creative",
      grabCursor: true,
      loop: true,
      spaceBetween: 10,
      speed: 800,
      creativeEffect: {
        limitProgress: 3,
        shadowPerProgress: true,
        prev: {
          translate: ["-120%", 0, 0],
          rotate: [0, 0, 10],
          shadow: true,
        },
        next: {
          translate: ["0%", 0, -500],
        },
      },
    });

    window.addEventListener("scroll", scrollListener);

    function scrollListener() {
      const videoHeight = video.getBoundingClientRect().height;
      const topValue = video.getBoundingClientRect().y;
      const screenH = window.screen.height;

      if (topValue < screenH) {
        video.play();
        window.removeEventListener("scroll", scrollListener);
      }
    }

    video.addEventListener("ended", () => {
      video.style.opacity = "0";
      swiperContainer.style.opacity = "1";

      swiper.on("slideChange", function () {
        finger.style.opacity = "0";
      });

      setInterval(() => {
        swiper.slideNext();
        finger.style.opacity = "0";
      }, 4000);

      setTimeout(() => {
        video.remove();
      }, 500);
    });

    function openUrl() {
      window.open(
        "https://www.mitsui-shopping-park.com.tw/lalaport/taichung/tw/index.html?utm_source=signin&utm_medium=bn&utm_campaign=lalanewuniverse",
      );
    }
  </script>
</html>
