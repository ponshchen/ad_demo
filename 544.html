<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>變形小金剛-影+圖</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/2.1.3/TweenMax.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/2.1.3/plugins/PixiPlugin.min.js"></script>
    <style>
      * {
        margin: 0;
      }

      #ad-wrapper {
        width: 100%;
        height: calc(100vw * 0.5625);
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: row-reverse;
        transition: 0.8s;
      }

      #top {
        position: absolute;
        right: 0;
        width: 30%;
        height: 100%;
        overflow: hidden;
        transition: 0.8s;
      }

      #topImage {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      #bottom {
        width: 70%;
        height: 100%;
        left: 0;
        bottom: 0;
        position: absolute;
        overflow: hidden;
        transition: 0.8s;
      }

      #bottomImage {
        position: absolute;
        top: 0;
        left: 50%;
        transform: translate(-50%, 0);
        height: 100%;
      }

      #cover {
        display: none;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <img src="./images/background0.png" style="width: 100vw" />
    <img src="./images/background1.png" style="width: 100vw" />
    <div id="ad-wrapper" onclick="openUrl()">
      <div id="top">
        <img src="./images/544/top.png" id="topImage" />
      </div>
      <div id="bottom">
        <img src="./images/544/bottom.png" id="bottomImage" />
      </div>
      <img src="./images/544/cover.gif" id="cover" />
    </div>
    <img src="./images/background2.png" style="width: 100vw" />
  </body>
  <script>
    const ad = document.getElementById("ad-wrapper");
    const topDiv = document.getElementById("top");
    const bottomDiv = document.getElementById("bottom");

    function delay(s) {
      return new Promise(function (resolve, reject) {
        setTimeout(resolve, s);
      });
    }

    function openUrl() {
      window.open("https://lihi1.com/7pw8P");
    }

    function openAd() {
      ad.style.display = "block";
      ad.style.height = `${ad.clientWidth / 1.2}px`;
      topDiv.style.height = `${ad.clientWidth * 0.56666667}px`;
      topDiv.style.width = "100%";
      bottomDiv.style.height = `${ad.clientWidth / 3.75}px`;
      bottomDiv.style.width = "100%";

      setTimeout(() => {
        const cover = document.getElementById("cover");
        cover.style.display = "block";
        topDiv.remove();
        bottomDiv.remove();
      }, 800);
    }
  </script>
  <script>
    let isOpened = false;

    window.addEventListener("scroll", (event) => {
      const adHeight = ad.getBoundingClientRect().height;
      const topValue = ad.getBoundingClientRect().y;
      const screenH = window.screen.height;

      if (!isOpened) {
        if (topValue < screenH - adHeight) {
          openAd();
          isOpened = true;
        }
      }
    });
  </script>
</html>
